{% if messages %}
  <section class="message-stack container" aria-label="Notifications">
    {% for message in messages %}
      <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show shadow-sm" role="alert">
        <i class="fa-solid fa-circle-info me-2" aria-hidden="true"></i>{{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    {% endfor %}
  </section>
{% endif %}
