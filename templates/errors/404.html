{% extends "base.html" %}
{% block title %}Page Not Found | QuizForge{% endblock %}
{% block content %}
<section class="error-section">
  <div class="container">
    <div class="error-card">
      <span class="error-code">404</span>
      <h1>Page not found</h1>
      <p>The page may have moved, or the link is no longer available.</p>
      <a class="btn btn-primary" href="{% url 'home' %}">Go home</a>
      <a class="btn btn-outline-primary" href="{% url 'quiz_list' %}">Browse quizzes</a>
    </div>
  </div>
</section>
{% endblock %}
