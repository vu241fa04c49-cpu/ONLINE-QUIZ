{% extends "base.html" %}
{% load static %}
{% block title %}Password Updated | QuizForge{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{% static 'css/auth.css' %}">{% endblock %}
{% block content %}
<section class="auth-section auth-compact">
  <div class="container">
    <div class="auth-panel text-center">
      <span class="auth-icon"><i class="fa-solid fa-circle-check"></i></span>
      <h1>Password updated</h1>
      <p class="text-muted">Your password has been changed. Sign in with your new password.</p>
      <a class="btn btn-primary" href="{% url 'login' %}">Login</a>
    </div>
  </div>
</section>
{% endblock %}
