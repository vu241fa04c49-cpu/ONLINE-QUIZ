{% extends "base.html" %}
{% load static %}
{% block title %}Email Sent | QuizForge{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{% static 'css/auth.css' %}">{% endblock %}
{% block content %}
<section class="auth-section auth-compact">
  <div class="container">
    <div class="auth-panel text-center">
      <span class="auth-icon"><i class="fa-regular fa-paper-plane"></i></span>
      <h1>Check your email</h1>
      <p class="text-muted">We sent password reset instructions if that email exists in QuizForge.</p>
      <a class="btn btn-primary" href="{% url 'login' %}">Return to login</a>
    </div>
  </div>
</section>
{% endblock %}
